<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Automated Chat Demo - English</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <nav class="langSwitch" aria-label="Language switch">
        <div class="langSwitch__label">Language</div>
        <div class="langSwitch__group">
          <a class="langSwitch__item" href="./index.html">日本語</a>
          <a class="langSwitch__item langSwitch__item--active" href="./english.html">English</a>
        </div>
      </nav>
      <section class="device" aria-label="English Chat Demo">
        <div class="device__screen">
          <div class="statusBar" aria-hidden="true">
            <span class="statusBar__time">8:00</span>
            <div class="statusBar__icons">
              <svg viewBox="0 0 24 24">
                <path d="M3.5 16.8h2.2V7.2H3.5v9.6Zm4 0h2.2V4.8H7.5v12Zm4 0h2.2V2.8h-2.2v14Zm4 0h2.2V6.2h-2.2v10.6Z" fill="currentColor" />
              </svg>
              <svg viewBox="0 0 24 24">
                <path
                  d="M2.8 9.4A11.6 11.6 0 0 1 12 4.8a11.6 11.6 0 0 1 9.2 4.6"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.7"
                  stroke-linecap="round"
                />
                <path
                  d="M6.1 12.6A7.3 7.3 0 0 1 12 10a7.3 7.3 0 0 1 5.9 2.6"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.7"
                  stroke-linecap="round"
                />
                <path d="M10.1 16a2.5 2.5 0 0 1 3.8 0" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" />
              </svg>
              <svg viewBox="0 0 28 14">
                <rect x="1" y="1" width="22" height="12" rx="3.3" fill="none" stroke="currentColor" stroke-width="1.5" />
                <rect x="3.5" y="3.5" width="16.8" height="7" rx="1.8" fill="currentColor" />
                <rect x="24.5" y="4.3" width="2.2" height="5.4" rx="1.1" fill="currentColor" />
              </svg>
            </div>
          </div>
          <header class="chatHeader">
            <button class="iconBtn iconBtn--back" type="button" aria-label="Back">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path
                  d="M15.5 19.5 8 12l7.5-7.5"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2.2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </button>
            <div class="chatHeader__title">
              <div class="chatHeader__row">
                <div class="avatar" aria-hidden="true">
                  <span class="avatar__mark"></span>
                </div>
                <div class="chatHeader__nameWrap">
                  <div class="chatHeader__nameRow">
                    <span class="chatHeader__name">Adidas</span>
                    <span class="verify" aria-label="Verified">
                      <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path
                          d="M12 2.4 14.1 4.7l2.9-.4 1.2 2.7 2.7 1.2-.4 2.9L21.6 12l-2.1 2.4.4 2.9-2.7 1.2-1.2 2.7-2.9-.4L12 21.6l-2.4-2.1-2.9.4-1.2-2.7-2.7-1.2.4-2.9L2.4 12l2.1-2.4-.4-2.9L6.8 5.5 8 2.8l2.9.4L12 2.4Z"
                          fill="currentColor"
                        />
                        <path
                          d="m10.4 12.4 1.3 1.3 3.4-3.6"
                          fill="none"
                          stroke="#fff"
                          stroke-width="2.2"
                          stroke-linecap="round"
                          stroke-linejoin="round"
                        />
                      </svg>
                    </span>
                  </div>
                  <div class="chatHeader__sub">Business account</div>
                </div>
              </div>
            </div>
            <button class="iconBtn iconBtn--more" type="button" aria-label="More">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M6 12a1.8 1.8 0 1 1 0 .01Zm6 0a1.8 1.8 0 1 1 0 .01Zm6 0a1.8 1.8 0 1 1 0 .01Z" fill="currentColor" />
              </svg>
            </button>
          </header>
          <section class="chatBody" aria-label="Messages">
            <ol class="msgList" id="msgList"></ol>
          </section>
          <section class="quickArea" aria-label="Quick Replies">
            <div class="quickWrap" id="quickWrap"></div>
          </section>
          <footer class="inputBar" aria-label="Message Input">
            <button class="iconBtn iconBtn--ghost" type="button" aria-label="Camera">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path
                  d="M7.7 7.5 9 6h6l1.3 1.5H19a2.5 2.5 0 0 1 2.5 2.5v7A2.5 2.5 0 0 1 19 19.5H5A2.5 2.5 0 0 1 2.5 17v-7A2.5 2.5 0 0 1 5 7.5h2.7Z"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linejoin="round"
                />
                <path
                  d="M12 16.6a3.4 3.4 0 1 0 0-6.8 3.4 3.4 0 0 0 0 6.8Z"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.8"
                />
              </svg>
            </button>
            <div class="inputPill">
              <input id="textInput" class="textInput" placeholder="" autocomplete="off" />
            </div>
            <div class="inputActions">
              <button class="iconBtn iconBtn--mini" type="button" aria-label="Emoji">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path
                    d="M12 21.5a9.5 9.5 0 1 0 0-19 9.5 9.5 0 0 0 0 19Z"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.8"
                  />
                  <path d="M8.8 10.6a1 1 0 1 0 0-2 1 1 0 0 0 0 2Zm6.4 0a1 1 0 1 0 0-2 1 1 0 0 0 0 2Z" fill="currentColor" />
                  <path
                    d="M8.6 14.2c.9 1.4 2.1 2.1 3.4 2.1s2.5-.7 3.4-2.1"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.8"
                    stroke-linecap="round"
                  />
                </svg>
              </button>
              <button class="iconBtn iconBtn--mini" type="button" aria-label="Image">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <rect x="3.2" y="5.2" width="17.6" height="13.6" rx="3.2" fill="none" stroke="currentColor" stroke-width="1.8" />
                  <circle cx="9.2" cy="10" r="1.6" fill="currentColor" />
                  <path
                    d="m7.1 16.2 3.2-3.1 2.5 2.1 3.6-4 2.3 2.8"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.8"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                </svg>
              </button>
              <button class="iconBtn iconBtn--mini" type="button" aria-label="Voice">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path
                    d="M12 14.8a3.2 3.2 0 0 0 3.2-3.2V6.9a3.2 3.2 0 1 0-6.4 0v4.7A3.2 3.2 0 0 0 12 14.8Z"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.8"
                  />
                  <path
                    d="M6.7 11.3a5.3 5.3 0 0 0 10.6 0"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.8"
                    stroke-linecap="round"
                  />
                  <path d="M12 16.6v3" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
                </svg>
              </button>
            </div>
          </footer>
          <div class="homeIndicator" aria-hidden="true"></div>
        </div>
      </section>
    </main>
    <script type="module" src="./app-en.js"></script>
  </body>
</html>
